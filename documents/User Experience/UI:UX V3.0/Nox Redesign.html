<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nox — Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{
      /* U of T inspired core */
      --uoft-navy:#1E3765;
      --uoft-navy-deep:#172A4F;
      --uoft-navy-soft:#283F73;
      --uoft-blue:#4A6FA5;
      --uoft-blue-light:#7196C7;

      /* Modernized neutrals */
      --paper:#F7F3EB;          /* warm parchment */
      --paper-2:#EFE9DD;
      --bone:#FBF8F2;
      --ink:#0F1729;
      --ink-2:#2A3447;
      --ink-3:#5A6478;
      --line:rgba(15,23,41,0.10);
      --line-2:rgba(15,23,41,0.06);

      /* Accents */
      --accent-good:oklch(0.74 0.13 150);
      --accent-okay:oklch(0.80 0.12 80);
      --accent-low:oklch(0.66 0.16 28);
      --accent-warm:#C8A24B;

      --r-sm:6px;
      --r-md:10px;
      --r-lg:16px;
      --r-xl:22px;

      --shadow-sm:0 1px 2px rgba(15,23,41,0.06), 0 1px 1px rgba(15,23,41,0.04);
      --shadow-md:0 4px 14px rgba(15,23,41,0.08), 0 1px 2px rgba(15,23,41,0.05);
      --shadow-lg:0 18px 40px rgba(15,23,41,0.12), 0 2px 6px rgba(15,23,41,0.06);

      --font-serif:'Newsreader', Georgia, 'Times New Roman', serif;
      --font-sans:'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono:'JetBrains Mono', ui-monospace, Menlo, monospace;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#E8E2D2;font-family:var(--font-sans);color:var(--ink);-webkit-font-smoothing:antialiased}
    button{font-family:inherit;cursor:pointer}
    input,textarea{font-family:inherit}

    /* ---- Generic helpers used inside artboards ---- */
    .nox-shell{font-family:var(--font-sans);color:var(--ink)}
    .mono{font-family:var(--font-mono);letter-spacing:0.02em}
    .serif{font-family:var(--font-serif)}

    /* tiny scrollbar everywhere inside the prototype */
    .nox-shell ::-webkit-scrollbar{width:6px;height:6px}
    .nox-shell ::-webkit-scrollbar-thumb{background:rgba(15,23,41,0.18);border-radius:3px}
    .nox-shell ::-webkit-scrollbar-track{background:transparent}

    /* DC overrides — make the canvas feel like a design board */
    .dc-root{background:#E8E2D2 !important}
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Speaker notes intentionally omitted; this is a design canvas, not a deck -->

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/primitives.jsx"></script>
  <script type="text/babel" src="src/student-mobile.jsx"></script>
  <script type="text/babel" src="src/student-desktop.jsx"></script>
  <script type="text/babel" src="src/professor.jsx"></script>
  <script type="text/babel" src="src/auth-uoft.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
